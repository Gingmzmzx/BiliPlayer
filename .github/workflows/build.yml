name: Build

on:
  push:
    tags: ["v*"]

jobs:
  macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: BiliPlayer-macOS-arm64
          path: dist/

  macos-x86_64:
    runs-on: macos-13
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: BiliPlayer-macOS-x86_64
          path: dist/

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install chromium
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: BiliPlayer-Windows-x64
          path: dist/
